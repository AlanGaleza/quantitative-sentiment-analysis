services:
  - type: web
    runtime: python
    name: quantitative-sentiment-analysis
    region: frankfurt
    plan: free
    buildCommand: uv sync --locked --no-dev
    startCommand: uv run --no-dev uvicorn quantitative_sentiment_analysis.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: QSA_CORS_ALLOWED_ORIGINS
        sync: false

  - type: web
    runtime: static
    name: quantitative-sentiment-analysis-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
